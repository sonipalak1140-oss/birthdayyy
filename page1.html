<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <style>
        * {
            margin: 0;
            padding: 0;
        }

        body {
            background-color: pink;
            position: relative;
            height: 100vh;
        }

        .password {
            background-color: rgb(216, 91, 112);
            width: 100%;
            height: 80px;
            font-size: 3rem;
            color: white;
            text-align: center;
            line-height: 80px;
            border-radius: 20px;
        }

        .passwordbtns {
            display: flex;
            width: 100%;
            flex-wrap: wrap;
            justify-content: space-between;
        }

        .passwordbtns>button {
            width: 30%;
            border: none;
            font-size: 15px;
            padding: 30px 0px;
            margin-bottom: 10px;
            background-color: rgb(255, 255, 255);
            border-radius: 20px;
        }
        .passwordbtns>button:hover{
            background-color: rgb(255, 219, 226);
        }
        .btn {
            background-color: rgb(216, 91, 112);
        }
    </style>
</head>

<body>
    <div class="container mt-5">
        <div class="row">
            <div class="col-6">
                <img src="cake.jfif" class="w-100">
            </div>
            <div class="col-6">
                <p class="password"></p>
                <div class="passwordbtns">
                    <button onclick="enterpassword('1')">1</button>
                    <button onclick="enterpassword('2')">2</button>
                    <button onclick="enterpassword('3')">3</button>
                    <button onclick="enterpassword('4')">4</button>
                    <button onclick="enterpassword('5')">5</button>
                    <button onclick="enterpassword('6')">6</button>
                    <button onclick="enterpassword('7')">7</button>
                    <button onclick="enterpassword('8')">8</button>
                    <button onclick="enterpassword('9')">9</button>
                    <button onclick="enterpassword('0')">0</button>
                    <button onclick="deletepassword()" class="deletebtn">delete</button>
                </div>
                <button class="btn enterbtn w-100">Enter</button>
            </div>
        </div>
    </div>
</body>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
    integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous">
    </script>
<script>
    let password = ""
    let passwordtext = document.querySelector('.password');
    function enterpassword(p) {
        if(password.length < 4){
           password += p;
           inscreen()
        }
        
    }

    function deletepassword() {
        password = password.slice(0, -1);
        inscreen()
    }

    function inscreen() {
        passwordtext.innerHTML=''
        for (let i = 0; i < password.length; i++) {
            passwordtext.innerHTML += '*'
        }
    }

    let enterbtn = document.querySelector('.enterbtn');
    enterbtn.addEventListener('click',function(){
        if(password=='1234'){
            window.location.href='page2.html'
        }
    })
</script>

</html>
